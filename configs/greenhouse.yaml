# 1000-pyeong Greenhouse Configuration
# Area: 1000 pyeong = 3,305.8 m²

greenhouse:
  area_m2: 3305.8
  height_m: 6.0
  volume_m3: 19834.8  # area_m2 * height_m
  
  envelope:
    u_value_W_m2K: 5.0  # Glass single-layer (field calibration recommended)
    ach_h: 0.3  # Air changes per hour during operation
    glass_transmissivity: 0.85
    
  hvac:
    cop_heating_curve:  # Outdoor temp (°C): COP
      "-5": 2.6
      "0": 3.0
      "5": 3.2
      "10": 3.6
      "15": 3.8
    cop_cooling: 3.2
    
substrate:
  type: coir
  volume_per_plant_L: 12
  drain_target_fraction: 0.25
  irrigation_efficiency: 0.9
  
operations:
  heating_set_C: 18.0
  cooling_set_C: 26.0
  p_band_C: 1.0
  co2_target_ppm: 800
  co2_enable_par_threshold: 50  # Enable CO2 injection when PAR > threshold
  
  # Ventilation
  vent_start_C: 22.0
  vent_full_C: 28.0
  
crops:
  tomato:
    plant_density_per_m2: 2.5
    n_fruits_per_truss_default: 4
    harvest_tdvs_threshold: 1.0
    moisture_content: 0.95  # 95% water, 5% DM
    
  cucumber:
    plant_density_per_m2: 1.72
    pruning_threshold: 18
    target_leaf_count: 15
    reproductive_node_threshold: 15
    moisture_content: 0.96  # 96% water, 4% DM

